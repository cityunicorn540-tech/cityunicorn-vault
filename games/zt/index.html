<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #111; }
        canvas { display: block; }
        
        /* Sound Toggle Button Styles */
        #soundBtn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(51, 51, 51, 0.8);
            border: 2px solid #fff;
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s, background 0.2s;
        }
        
        #soundBtn:hover {
            background: rgba(85, 85, 85, 0.9);
            transform: scale(1.1);
        }
        
        #soundBtn svg {
            width: 28px;
            height: 28px;
            fill: white;
        }
        
        /* Game Over Menu Styles */
        #gameOverMenu {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 100;
        }
        
        #gameOverMenu h1 {
            color: #ff4444;
            font-family: Arial, sans-serif;
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px #000;
        }
        
        #gameOverMenu p {
            color: white;
            font-family: Arial, sans-serif;
            font-size: 28px;
            margin-bottom: 30px;
        }
        
        #playAgainBtn {
            padding: 15px 40px;
            font-size: 24px;
            font-family: Arial, sans-serif;
            background: #00FF00;
            color: #111;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
        }
        
        #playAgainBtn:hover {
            transform: scale(1.1);
            background: #44ff44;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<!-- Sound Toggle Button -->
<button id="soundBtn" title="Toggle Sound">
    <!-- Sound Off Icon (default) -->
    <svg id="soundOffIcon" viewBox="0 0 24 24">
        <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
    </svg>
    <!-- Sound On Icon (hidden by default) -->
    <svg id="soundOnIcon" viewBox="0 0 24 24" style="display: none;">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
    </svg>
</button>

<!-- Game Over Menu -->
<div id="gameOverMenu">
    <h1>GAME OVER</h1>
    <p>Score: <span id="finalScore">0</span></p>
    <button id="playAgainBtn">Play Again</button>
</div>

<script>
    // 1. SETUP
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Game state
    let isGameOver = false;
    let gameRunning = true;
    let isMuted = true; // Default: sound is OFF

    // 2. AUDIO SYSTEM (Web Audio API)
    let audioCtx = null;
    
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }
    
    // Sound: Coin collection (high-pitched chime)
    function playCoinSound() {
        if (isMuted || !audioCtx) return;
        
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // A5
        oscillator.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.1); // A6
        
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
        
        oscillator.start(audioCtx.currentTime);
        oscillator.stop(audioCtx.currentTime + 0.15);
    }
    
    // Sound: Enemy collision (low-pitched thud)
    function playCollisionSound() {
        if (isMuted || !audioCtx) return;
        
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        oscillator.type = 'sawtooth';
        oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
        
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        
        oscillator.start(audioCtx.currentTime);
        oscillator.stop(audioCtx.currentTime + 0.3);
    }
    
    // Sound: Game over (descending tone)
    function playGameOverSound() {
        if (isMuted || !audioCtx) return;
        
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        oscillator.type = 'square';
        oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.5);
        
        gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        
        oscillator.start(audioCtx.currentTime);
        oscillator.stop(audioCtx.currentTime + 0.5);
    }
    
    // Sound Toggle Button Logic
    const soundBtn = document.getElementById("soundBtn");
    const soundOffIcon = document.getElementById("soundOffIcon");
    const soundOnIcon = document.getElementById("soundOnIcon");
    
    function toggleSound() {
        initAudio(); // Initialize audio context on user interaction
        isMuted = !isMuted;
        
        if (isMuted) {
            soundOffIcon.style.display = "block";
            soundOnIcon.style.display = "none";
        } else {
            soundOffIcon.style.display = "none";
            soundOnIcon.style.display = "block";
            // Play a small confirmation beep
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.1);
        }
    }
    
    soundBtn.addEventListener("click", toggleSound);
    soundBtn.addEventListener("touchstart", (e) => {
        e.preventDefault();
        toggleSound();
    });

    // 3. PLAYER & COIN VARIABLES
    let playerX = canvas.width / 2;
    let playerY = canvas.height / 2;
    let targetX = playerX;
    let targetY = playerY;
    let speed = 0.1;
    let score = 0;

    let coinX = Math.random() * (canvas.width - 50) + 25;
    let coinY = Math.random() * (canvas.height - 50) + 25;

    // 4. ENEMY VARIABLES
    // Enemy 1 (always active)
    let enemyX = 100;
    let enemyY = 100;
    let enemyDX = 4; 
    let enemyDY = 4;

    // Enemy 2 (appears at score 10)
    let enemy2X = canvas.width - 100;
    let enemy2Y = canvas.height - 100;
    let enemy2DX = -4; 
    let enemy2DY = -4;

    // Enemy 3 (appears at score 30)
    let enemy3X = 100;
    let enemy3Y = canvas.height - 100;
    let enemy3DX = 4; 
    let enemy3DY = -4;

    // Enemy 4 (appears at score 40)
    let enemy4X = canvas.width - 100;
    let enemy4Y = 100;
    let enemy4DX = -4; 
    let enemy4DY = 4;

    // DOM Elements
    const gameOverMenu = document.getElementById("gameOverMenu");
    const finalScoreSpan = document.getElementById("finalScore");
    const playAgainBtn = document.getElementById("playAgainBtn");

    // Function to reset enemy positions to corners (far from center/player)
    function resetEnemies() {
        // Reset Enemy 1 to top-left corner
        enemyX = 50;
        enemyY = 50;
        
        // Reset Enemy 2 to bottom-right corner
        enemy2X = canvas.width - 50;
        enemy2Y = canvas.height - 50;

        // Reset Enemy 3 to bottom-left corner
        enemy3X = 50;
        enemy3Y = canvas.height - 50;

        // Reset Enemy 4 to top-right corner
        enemy4X = canvas.width - 50;
        enemy4Y = 50;
    }

    // Function to restart the game
    function restartGame() {
        score = 0;
        playerX = canvas.width / 2;
        playerY = canvas.height / 2;
        targetX = playerX;
        targetY = playerY;
        
        // Reset enemies to corners far from player
        resetEnemies();
        
        // Hide menu and resume game
        gameOverMenu.style.display = "none";
        isGameOver = false;
        gameRunning = true;
    }

    // Play Again button click handler
    playAgainBtn.addEventListener("click", restartGame);

    function update() {
        // Don't update game logic if game is over
        if (isGameOver) return;

        // Move Player toward touch
        playerX += (targetX - playerX) * speed;
        playerY += (targetY - playerY) * speed;

        // Move Enemy 1 and Bounce (always active)
        enemyX += enemyDX;
        enemyY += enemyDY;
        if (enemyX < 0 || enemyX > canvas.width) enemyDX *= -1;
        if (enemyY < 0 || enemyY > canvas.height) enemyDY *= -1;

        // Move Enemy 2 (if score >= 10)
        if (score >= 10) {
            enemy2X += enemy2DX;
            enemy2Y += enemy2DY;
            if (enemy2X < 0 || enemy2X > canvas.width) enemy2DX *= -1;
            if (enemy2Y < 0 || enemy2Y > canvas.height) enemy2DY *= -1;
        }

        // Move Enemy 3 (if score >= 30)
        if (score >= 30) {
            enemy3X += enemy3DX;
            enemy3Y += enemy3DY;
            if (enemy3X < 0 || enemy3X > canvas.width) enemy3DX *= -1;
            if (enemy3Y < 0 || enemy3Y > canvas.height) enemy3DY *= -1;
        }

        // Move Enemy 4 (if score >= 40)
        if (score >= 40) {
            enemy4X += enemy4DX;
            enemy4Y += enemy4DY;
            if (enemy4X < 0 || enemy4X > canvas.width) enemy4DX *= -1;
            if (enemy4Y < 0 || enemy4Y > canvas.height) enemy4DY *= -1;
        }

        // Check for collision between enemies and bounce off each other
        let enemies = [
            { x: enemyX,  y: enemyY,  dx: enemyDX,  dy: enemyDY,  index: 1 },
            { x: enemy2X, y: enemy2Y, dx: enemy2DX, dy: enemy2DY, index: 2 },
            { x: enemy3X, y: enemy3Y, dx: enemy3DX, dy: enemy3DY, index: 3 },
            { x: enemy4X, y: enemy4Y, dx: enemy4DX, dy: enemy4DY, index: 4 }
        ];

        // Only check active enemies based on score
        let activeEnemies = [enemies[0]];
        if (score >= 10) activeEnemies.push(enemies[1]);
        if (score >= 30) activeEnemies.push(enemies[2]);
        if (score >= 40) activeEnemies.push(enemies[3]);

        // Check collisions between all active enemies
        for (let i = 0; i < activeEnemies.length; i++) {
            for (let j = i + 1; j < activeEnemies.length; j++) {
                let e1 = activeEnemies[i];
                let e2 = activeEnemies[j];
                let dist = Math.hypot(e1.x - e2.x, e1.y - e2.y);
                
                if (dist < 30) {
                    // Swap velocities
                    let tempDX = e1.dx;
                    let tempDY = e1.dy;
                    
                    if (e1.index === 1) { enemyDX = e2.dx; enemyDY = e2.dy; }
                    else if (e1.index === 2) { enemy2DX = e2.dx; enemy2DY = e2.dy; }
                    else if (e1.index === 3) { enemy3DX = e2.dx; enemy3DY = e2.dy; }
                    else if (e1.index === 4) { enemy4DX = e2.dx; enemy4DY = e2.dy; }
                    
                    if (e2.index === 1) { enemyDX = tempDX; enemyDY = tempDY; }
                    else if (e2.index === 2) { enemy2DX = tempDX; enemy2DY = tempDY; }
                    else if (e2.index === 3) { enemy3DX = tempDX; enemy3DY = tempDY; }
                    else if (e2.index === 4) { enemy4DX = tempDX; enemy4DY = tempDY; }
                    
                    // Push enemies apart
                    let angle = Math.atan2(e1.y - e2.y, e1.x - e2.x);
                    if (e1.index === 1) { enemyX  += Math.cos(angle) * 5; enemyY  += Math.sin(angle) * 5; }
                    else if (e1.index === 2) { enemy2X += Math.cos(angle) * 5; enemy2Y += Math.sin(angle) * 5; }
                    else if (e1.index === 3) { enemy3X += Math.cos(angle) * 5; enemy3Y += Math.sin(angle) * 5; }
                    else if (e1.index === 4) { enemy4X += Math.cos(angle) * 5; enemy4Y += Math.sin(angle) * 5; }
                    
                    if (e2.index === 1) { enemyX  -= Math.cos(angle) * 5; enemyY  -= Math.sin(angle) * 5; }
                    else if (e2.index === 2) { enemy2X -= Math.cos(angle) * 5; enemy2Y -= Math.sin(angle) * 5; }
                    else if (e2.index === 3) { enemy3X -= Math.cos(angle) * 5; enemy3Y -= Math.sin(angle) * 5; }
                    else if (e2.index === 4) { enemy4X -= Math.cos(angle) * 5; enemy4Y -= Math.sin(angle) * 5; }
                }
            }
        }

        // Check for Coin (Win)
        let coinDist = Math.hypot(playerX - coinX, playerY - coinY);
        if (coinDist < 40) {
            coinX = Math.random() * (canvas.width - 50) + 25;
            coinY = Math.random() * (canvas.height - 50) + 25;
            score++;
            playCoinSound(); // Play coin sound
        }

        // Check for Enemies (Lose)
        let enemyDist  = Math.hypot(playerX - enemyX,  playerY - enemyY);
        let enemy2Dist = Math.hypot(playerX - enemy2X, playerY - enemy2Y);
        let enemy3Dist = Math.hypot(playerX - enemy3X, playerY - enemy3Y);
        let enemy4Dist = Math.hypot(playerX - enemy4X, playerY - enemy4Y);
        
        // Check collision with active enemies
        let collision = enemyDist < 35;
        if (score >= 10) collision = collision || (enemy2Dist < 35);
        if (score >= 30) collision = collision || (enemy3Dist < 35);
        if (score >= 40) collision = collision || (enemy4Dist < 35);
        
        if (collision) {
            // Play collision and game over sounds
            playCollisionSound();
            playGameOverSound();
            
            // Show game over menu instead of alert
            isGameOver = true;
            finalScoreSpan.textContent = score;
            gameOverMenu.style.display = "flex";
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Coin
        ctx.fillStyle = "gold";
        ctx.beginPath();
        ctx.arc(coinX, coinY, 15, 0, Math.PI * 2);
        ctx.fill();

        // Draw Enemy 1 (always active)
        ctx.fillStyle = "#00BCD4";
        ctx.fillRect(enemyX - 15, enemyY - 15, 30, 30);

        // Draw Enemy 2 (appears at score 10)
        if (score >= 10) {
            ctx.fillRect(enemy2X - 15, enemy2Y - 15, 30, 30);
        }

        // Draw Enemy 3 (appears at score 30)
        if (score >= 30) {
            ctx.fillRect(enemy3X - 15, enemy3Y - 15, 30, 30);
        }

        // Draw Enemy 4 (appears at score 40)
        if (score >= 40) {
            ctx.fillRect(enemy4X - 15, enemy4Y - 15, 30, 30);
        }

        // Draw Player
        ctx.fillStyle = "#00FF00";
        ctx.fillRect(playerX - 25, playerY - 25, 50, 50);

        // Draw Score
        ctx.fillStyle = "white";
        ctx.font = "24px Arial";
        ctx.fillText("Score: " + score, 20, 40);

        // Update game logic each frame
        update();
        requestAnimationFrame(draw);
    }

    // 5. TOUCH CONTROLS
    canvas.addEventListener("touchstart", (e) => {
        // Don't allow movement when game is over
        if (isGameOver) return;
        targetX = e.touches[0].clientX;
        targetY = e.touches[0].clientY;
    });
    canvas.addEventListener("touchmove", (e) => {
        // Don't allow movement when game is over
        if (isGameOver) return;
        targetX = e.touches[0].clientX;
        targetY = e.touches[0].clientY;
        e.preventDefault(); 
    });

    // Mouse controls for desktop
    canvas.addEventListener("mousedown", (e) => {
        if (isGameOver) return;
        targetX = e.clientX;
        targetY = e.clientY;
    });
    canvas.addEventListener("mousemove", (e) => {
        if (e.buttons === 1 && !isGameOver) {
            targetX = e.clientX;
            targetY = e.clientY;
        }
    });

    // Handle window resize
    window.addEventListener("resize", () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    draw(); 
</script>

</body>
</html>
