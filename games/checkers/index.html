<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>♟️ Checkers | cityunicorn540-tech</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body {
            margin: 0; height: 100vh; overflow: hidden;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif; position: fixed; width: 100%;
        }
        .game-container {
            background: rgba(0, 0, 0, 0.4); padding: 15px; border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            max-width: 500px; width: 95vw; border: 1px solid rgba(255,255,255,0.1);
        }
        .board {
            display: grid; grid-template-columns: repeat(8, 1fr); aspect-ratio: 1 / 1;
            width: 100%; border: 8px solid #5d4037; border-radius: 8px;
            background-color: #d1c4a1; overflow: hidden; touch-action: none;
        }
        .cell { aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .cell.black { background-color: #5d4037; }
        .cell.white { background-color: #d1c4a1; }
        
        /* Piece Styling */
        .piece { width: 85%; height: 85%; border-radius: 50%; position: relative; transition: transform 0.2s; z-index: 5; }
        .piece.player { background: radial-gradient(circle at 30% 30%, #ff5e5e, #8b0000); box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4); border: 1px solid #ff9696; }
        .piece.ai { background: radial-gradient(circle at 35% 35%, #555555, #111111); box-shadow: 0 4px 8px rgba(0, 0, 0, 0.6); border: 1.5px solid #999999; }
        .piece.king::after { content: "♔"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -55%); font-size: 1.8rem; color: #ffd700; text-shadow: 0 2px 4px black; }
        .piece.selected { box-shadow: 0 0 0 3px gold, 0 0 20px gold; z-index: 10; }

        /* SCANNER EFFECT */
        @keyframes pulse-red {
            0% { box-shadow: 0 0 5px #ff0000; border-color: #ff0000; }
            50% { box-shadow: 0 0 20px #ff0000; border-color: #ff5555; }
            100% { box-shadow: 0 0 5px #ff0000; border-color: #ff0000; }
        }
        .piece.in-danger { animation: pulse-red 1s infinite; border: 2.5px solid red !important; cursor: pointer; }

        /* JUMP INDICATORS */
        .valid-move { position: absolute; width: 40%; height: 40%; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 2; }
        .jump-path { background: rgba(255, 255, 0, 0.5) !important; box-shadow: 0 0 15px #ff0 !important; }
        .jump-path::after { content: "➜"; color: #000; font-weight: bold; font-size: 0.9rem; }
        .simple-move { background: rgba(0, 255, 0, 0.5); box-shadow: 0 0 10px #0f0; }

        .status-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding: 10px 20px; background: rgba(0,0,0,0.3); border-radius: 50px; color: white; font-weight: bold; }
        .controls { display: flex; gap: 10px; margin-top: 15px; justify-content: center; }
        button { padding: 10px 20px; border-radius: 50px; border: none; background: #ff5252; color: white; font-weight: bold; cursor: pointer; box-shadow: 0 4px #b71c1c; }
        button:active { transform: translateY(2px); box-shadow: 0 2px #b71c1c; }
    </style>
</head>
<body>

<div class="game-container">
    <div class="board" id="board"></div>
    <div class="status-bar">
        <span>🔴 Player: <span id="p-score">12</span></span>
        <div id="turn-text">YOUR TURN</div>
        <span>⚫ AI: <span id="a-score">12</span></span>
    </div>
    <div class="controls">
        <button onclick="location.reload()">NEW GAME</button>
        <button id="muteBtn" onclick="toggleMute()" style="background:#444;">🔊</button>
    </div>
</div>

<script>
    const BOARD_SIZE = 8;
    const EMPTY = 0, PLAYER = 1, PLAYER_KING = 2, AI = 3, AI_KING = 4;
    let board = [], currentPlayer = PLAYER, selectedPiece = null, validMoves = [], gameActive = true, isMuted = false, isMultiJump = false;
    let pScore = 12, aScore = 12;

    function toggleMute() { isMuted = !isMuted; document.getElementById('muteBtn').innerText = isMuted ? '🔇' : '🔊'; }

    function playSound(type) {
        if (isMuted) return;
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        const now = ctx.currentTime;
        if (type === 'move') { osc.frequency.setValueAtTime(150, now); gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(); osc.stop(now + 0.1); } 
        else if (type === 'capture') { osc.type = 'square'; osc.frequency.setValueAtTime(400, now); gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(); osc.stop(now + 0.1); } 
        else if (type === 'king') { osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(600, now + 0.2); gain.gain.setValueAtTime(0.1, now); osc.start(); osc.stop(now + 0.2); }
    }

    function init() {
        board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(EMPTY));
        for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) if ((r + c) % 2 === 1) { if (r < 3) board[r][c] = AI; else if (r > 4) board[r][c] = PLAYER; }
        render();
    }

    function render() {
        const boardEl = document.getElementById('board');
        boardEl.innerHTML = '';
        
        // Find AI pieces currently in danger of being jumped
        const jumpTargets = selectedPiece ? validMoves.filter(m => m.cap).map(m => m.cap) : [];

        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                const cell = document.createElement('div');
                cell.className = `cell ${(r+c)%2===0 ? 'white' : 'black'}`;
                cell.onclick = () => handleTap(r, c);
                
                const pieceType = board[r][c];
                if (pieceType !== EMPTY) {
                    const p = document.createElement('div');
                    p.className = `piece ${pieceType <= 2 ? 'player' : 'ai'} ${[2,4].includes(pieceType) ? 'king' : ''}`;
                    if (selectedPiece?.r === r && selectedPiece?.c === c) p.classList.add('selected');
                    
                    // AUTO-JUMP TRIGGER: If this piece is jumpable, it pulses and handles the tap
                    if (jumpTargets.some(t => t.r === r && t.c === c)) {
                        p.classList.add('in-danger');
                    }
                    cell.appendChild(p);
                }

                const move = validMoves.find(m => m.r === r && m.c === c);
                if (move) {
                    const mInd = document.createElement('div');
                    mInd.className = `valid-move ${move.cap ? 'jump-path' : 'simple-move'}`;
                    cell.appendChild(mInd);
                }
                boardEl.appendChild(cell);
            }
        }
        document.getElementById('p-score').innerText = pScore; document.getElementById('a-score').innerText = aScore;
    }

    function handleTap(r, c) {
        if (!gameActive || currentPlayer === AI) return;
        
        const tappedPiece = board[r][c];

        // Logic for clicking an enemy to jump it
        if (selectedPiece && tappedPiece >= 3) {
            const jumpMove = validMoves.find(m => m.cap && m.cap.r === r && m.cap.c === c);
            if (jumpMove) {
                executeMove(selectedPiece.r, selectedPiece.c, jumpMove.r, jumpMove.c, jumpMove);
                return;
            }
        }

        if (tappedPiece === PLAYER || tappedPiece === PLAYER_KING) {
            if (isMultiJump) return; // Must finish current piece's jump
            selectedPiece = {r, c}; validMoves = getMoves(r, c, tappedPiece);
        } else if (selectedPiece) {
            const move = validMoves.find(m => m.r === r && m.c === c);
            if (move) executeMove(selectedPiece.r, selectedPiece.c, r, c, move);
        }
        render();
    }

    function getMoves(r, c, type) {
        let moves = [];
        let dirs;
        
        // FIXED: Correct direction logic based on piece type
        if (type === PLAYER) {
            dirs = [-1]; // Player moves up (toward row 0)
        } else if (type === PLAYER_KING) {
            dirs = [-1, 1]; // Player king moves both directions
        } else if (type === AI) {
            dirs = [1]; // AI moves down (toward row 7)
        } else if (type === AI_KING) {
            dirs = [-1, 1]; // AI king moves both directions
        }
        
        // During multi-jump, only allow jumps (no simple moves)
        const allowSimpleMoves = !isMultiJump;
        
        dirs.forEach(dr => [-1, 1].forEach(dc => {
            let nr = r + dr, nc = c + dc;
            if (allowSimpleMoves && nr>=0 && nr<8 && nc>=0 && nc<8 && board[nr][nc] === EMPTY) moves.push({r: nr, c: nc});
            let jr = r + dr*2, jc = c + dc*2;
            if (jr>=0 && jr<8 && jc>=0 && jc<8 && board[jr][jc] === EMPTY) {
                let mid = board[r+dr][c+dc];
                if (mid !== EMPTY && ((type <= 2 && mid >= 3) || (type >= 3 && mid <= 2))) moves.push({r: jr, c: jc, cap: {r: r+dr, c: c+dc}});
            }
        }));
        return moves;
    }

    function checkGameOver() {
        // Check if AI has no pieces
        let aiPieces = 0, playerPieces = 0;
        for(let r=0; r<8; r++) for(let c=0; c<8; c++) {
            if(board[r][c] >= AI) aiPieces++;
            if(board[r][c] >= PLAYER && board[r][c] <= PLAYER_KING) playerPieces++;
        }
        
        if (aiPieces === 0) {
            gameActive = false;
            document.getElementById('turn-text').innerText = "YOU WIN!";
            return true;
        }
        if (playerPieces === 0) {
            gameActive = false;
            document.getElementById('turn-text').innerText = "AI WINS!";
            return true;
        }
        
        // Check if current player has any valid moves
        let currentHasMoves = false;
        for(let r=0; r<8; r++) for(let c=0; c<8; c++) {
            if(currentPlayer === PLAYER && (board[r][c] === PLAYER || board[r][c] === PLAYER_KING)) {
                if(getMoves(r, c, board[r][c]).length > 0) currentHasMoves = true;
            }
            if(currentPlayer === AI && (board[r][c] === AI || board[r][c] === AI_KING)) {
                if(getMoves(r, c, board[r][c]).length > 0) currentHasMoves = true;
            }
        }
        
        if (!currentHasMoves) {
            gameActive = false;
            document.getElementById('turn-text').innerText = currentPlayer === PLAYER ? "AI WINS!" : "YOU WIN!";
            return true;
        }
        
        return false;
    }

    function executeMove(fr, fc, tr, tc, move) {
        const piece = board[fr][fc];
        board[tr][tc] = piece;
        board[fr][fc] = EMPTY;
        if (move.cap) { board[move.cap.r][move.cap.c] = EMPTY; if (currentPlayer === PLAYER) aScore--; else pScore--; playSound('capture'); } 
        else { playSound('move'); }

        if ((tr === 0 && piece === PLAYER) || (tr === 7 && piece === AI)) { board[tr][tc] = piece === PLAYER ? PLAYER_KING : AI_KING; playSound('king'); }

        const nextJumps = move.cap ? getMoves(tr, tc, board[tr][tc]).filter(m => m.cap) : [];
        if (nextJumps.length > 0) {
            isMultiJump = true; selectedPiece = {r: tr, c: tc}; validMoves = nextJumps;
            document.getElementById('turn-text').innerText = "KEEP JUMPING!";
            if (currentPlayer === AI) setTimeout(() => { const sel = nextJumps[0]; executeMove(tr, tc, sel.r, sel.c, sel); }, 600);
            render();
        } else {
            isMultiJump = false; selectedPiece = null; validMoves = [];
            currentPlayer = (currentPlayer === PLAYER) ? AI : PLAYER;
            document.getElementById('turn-text').innerText = currentPlayer === PLAYER ? "YOUR TURN" : "AI THINKING...";
            render();
            
            // Check for game over after switching turns
            if (checkGameOver()) return;
            
            if (currentPlayer === AI) setTimeout(aiPlay, 800);
        }
    }

    function aiPlay() {
        let all = [];
        for(let r=0; r<8; r++) for(let c=0; c<8; c++) if(board[r][c] >= AI) getMoves(r,c,board[r][c]).forEach(m => all.push({fr:r, fc:c, tr:m.r, tc:m.c, move:m}));
        
        if (all.length === 0) {
            gameActive = false;
            document.getElementById('turn-text').innerText = "YOU WIN!";
            return;
        }
        
        // Force AI to make jumps when available
        const caps = all.filter(m => m.move.cap);
        
        // If AI can jump, it MUST jump (forced capture rule)
        if (caps.length > 0) {
            // If in multi-jump, continue with the same piece
            if (isMultiJump && selectedPiece) {
                const continueJumps = caps.filter(m => m.fr === selectedPiece.r && m.fc === selectedPiece.c);
                if (continueJumps.length > 0) {
                    const sel = continueJumps[0];
                    executeMove(sel.fr, sel.fc, sel.tr, sel.tc, sel.move);
                    return;
                }
            }
            // Otherwise pick first available jump
            const sel = caps[0];
            executeMove(sel.fr, sel.fc, sel.tr, sel.tc, sel.move);
        } else {
            // No jumps available, pick random simple move
            const sel = all[Math.floor(Math.random()*all.length)];
            executeMove(sel.fr, sel.fc, sel.tr, sel.tc, sel.move);
        }
    }
    init();
</script>
</body>
</html>
