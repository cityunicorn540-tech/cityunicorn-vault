<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="author" content="cityunicorn540-tech">
    <title>Checkers | CityUnicorn</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body {
            margin: 0; height: 100vh; overflow: hidden;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif; position: fixed; width: 100%;
        }
        .game-container {
            background: rgba(0, 0, 0, 0.5); padding: 15px; border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            max-width: 450px; width: 95vw; border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        .header-area { margin-bottom: 10px; }
        .header-area h2 { color: #fff; margin: 0; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; }
        .dev-credit { color: rgba(255,255,255,0.6); font-size: 0.7rem; margin-bottom: 10px; }

        .board {
            display: grid; grid-template-columns: repeat(8, 1fr); aspect-ratio: 1 / 1;
            width: 100%; border: 6px solid #4e342e; border-radius: 8px;
            background-color: #d1c4a1; overflow: hidden; touch-action: none;
        }
        .cell { aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .cell.black { background-color: #5d4037; }
        .cell.white { background-color: #d1c4a1; }
        
        .piece { width: 85%; height: 85%; border-radius: 50%; position: relative; transition: transform 0.2s; z-index: 5; }
        .piece.player { background: radial-gradient(circle at 30% 30%, #ff5e5e, #8b0000); box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4); border: 1px solid #ff9696; }
        .piece.ai { background: radial-gradient(circle at 35% 35%, #555555, #111111); box-shadow: 0 4px 8px rgba(0, 0, 0, 0.6); border: 1.5px solid #999999; }
        
        /* FIX: Using Unicode CSS sequence for King to prevent broken symbols */
        .piece.king::after { content: "\2654"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -55%); font-size: 1.8rem; color: #ffd700; text-shadow: 0 2px 4px black; }
        .piece.selected { box-shadow: 0 0 0 3px gold, 0 0 20px gold; z-index: 10; }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 5px #ff0000; border-color: #ff0000; }
            50% { box-shadow: 0 0 20px #ff0000; border-color: #ff5555; }
            100% { box-shadow: 0 0 5px #ff0000; border-color: #ff0000; }
        }
        .piece.in-danger { animation: pulse-red 1s infinite; border: 2.5px solid red !important; cursor: pointer; }

        .valid-move { position: absolute; width: 40%; height: 40%; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 2; }
        .jump-path { background: rgba(255, 255, 0, 0.5) !important; box-shadow: 0 0 15px #ff0 !important; }
        /* FIX: Using Unicode for Arrow */
        .jump-path::after { content: "\279C"; color: #000; font-weight: bold; font-size: 0.9rem; }
        .simple-move { background: rgba(0, 255, 0, 0.5); box-shadow: 0 0 10px #0f0; }

        .status-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding: 10px 20px; background: rgba(0,0,0,0.3); border-radius: 50px; color: white; font-weight: bold; font-size: 0.8rem; }
        .controls { display: flex; gap: 10px; margin-top: 15px; justify-content: center; }
        button { padding: 10px 20px; border-radius: 50px; border: none; background: #ff5252; color: white; font-weight: bold; cursor: pointer; box-shadow: 0 4px #b71c1c; font-size: 0.8rem; }
        button:active { transform: translateY(2px); box-shadow: 0 2px #b71c1c; }
    </style>
</head>
<body>

<div class="game-container">
    <div class="header-area">
        <h2>Checkers</h2>
        <p class="dev-credit">by cityunicorn540-tech</p>
    </div>
    <div class="board" id="board"></div>
    <div class="status-bar">
        <span>&#128308; Player: <span id="p-score">12</span></span>
        <div id="turn-text">YOUR TURN</div>
        <span>&#9899; AI: <span id="a-score">12</span></span>
    </div>
    <div class="controls">
        <button id="new-game-btn">NEW GAME</button>
        <button id="muteBtn" style="background:#444;">&#128266;</button>
    </div>
</div>

<script>
    const BOARD_SIZE = 8;
    const EMPTY = 0, PLAYER = 1, PLAYER_KING = 2, AI = 3, AI_KING = 4;
    let board = [], currentPlayer = PLAYER, selectedPiece = null, validMoves = [], gameActive = true, isMuted = false, isMultiJump = false;
    let pScore = 12, aScore = 12;

    // FIX: Professional Reset to avoid Browser Selection Menus
    document.getElementById('new-game-btn').onclick = () => {
        if(confirm("Restart Game?")) init();
    };

    function toggleMute() { 
        isMuted = !isMuted; 
        document.getElementById('muteBtn').innerHTML = isMuted ? '&#128263;' : '&#128266;'; 
    }

    function playSound(type) {
        if (isMuted) return;
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            const now = ctx.currentTime;
            if (type === 'move') { osc.frequency.setValueAtTime(150, now); gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(); osc.stop(now + 0.1); } 
            else if (type === 'capture') { osc.type = 'square'; osc.frequency.setValueAtTime(400, now); gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(); osc.stop(now + 0.1); } 
            else if (type === 'king') { osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(600, now + 0.2); gain.gain.setValueAtTime(0.1, now); osc.start(); osc.stop(now + 0.2); }
        } catch(e) { console.log("Audio not supported"); }
    }

    function init() {
        board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(EMPTY));
        for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) if ((r + c) % 2 === 1) { if (r < 3) board[r][c] = AI; else if (r > 4) board[r][c] = PLAYER; }
        currentPlayer = PLAYER;
        gameActive = true;
        isMultiJump = false;
        selectedPiece = null;
        validMoves = [];
        document.getElementById('turn-text').innerText = "YOUR TURN";
        updateScore();
        render();
    }
    
    function updateScore() {
        let ai = 0, player = 0;
        for(let r = 0; r < 8; r++) {
            for(let c = 0; c < 8; c++) {
                if(board[r][c] === AI || board[r][c] === AI_KING) ai++;
                if(board[r][c] === PLAYER || board[r][c] === PLAYER_KING) player++;
            }
        }
        pScore = player;
        aScore = ai;
    }

    function render() {
        const boardEl = document.getElementById('board');
        boardEl.innerHTML = '';
        const jumpTargets = selectedPiece ? validMoves.filter(m => m.cap).map(m => m.cap) : [];
        
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                const cell = document.createElement('div');
                cell.className = `cell ${(r + c) % 2 === 1 ? 'black' : 'white'}`;
                cell.onclick = () => handleTap(r, c);
                
                const pieceType = board[r][c];
                if (pieceType !== EMPTY) {
                    const p = document.createElement('div');
                    p.className = `piece ${pieceType <= 2 ? 'player' : 'ai'} ${[2,4].includes(pieceType) ? 'king' : ''}`;
                    if (selectedPiece && selectedPiece.r === r && selectedPiece.c === c) p.classList.add('selected');
                    if (jumpTargets.some(t => t.r === r && t.c === c)) p.classList.add('in-danger');
                    cell.appendChild(p);
                }
                
                if (validMoves.length > 0) {
                    const move = validMoves.find(m => m.r === r && m.c === c);
                    if (move) {
                        const mInd = document.createElement('div');
                        mInd.className = `valid-move ${move.cap ? 'jump-path' : 'simple-move'}`;
                        cell.appendChild(mInd);
                    }
                }
                boardEl.appendChild(cell);
            }
        }
        document.getElementById('p-score').innerText = pScore;
        document.getElementById('a-score').innerText = aScore;
    }

    function handleTap(r, c) {
        if (!gameActive || currentPlayer !== PLAYER) return;
        const tappedPiece = board[r][c];
        if (selectedPiece && tappedPiece >= 3) {
            const jumpMove = validMoves.find(m => m.cap && m.cap.r === r && m.cap.c === c);
            if (jumpMove) { executeMove(selectedPiece.r, selectedPiece.c, jumpMove.r, jumpMove.c, jumpMove); return; }
        }
        if (tappedPiece === PLAYER || tappedPiece === PLAYER_KING) {
            if (isMultiJump) return;
            selectedPiece = {r, c};
            validMoves = getAllMoves(r, c, tappedPiece);
        } else if (selectedPiece && tappedPiece === EMPTY) {
            const move = validMoves.find(m => m.r === r && m.c === c);
            if (move) { executeMove(selectedPiece.r, selectedPiece.c, r, c, move); return; }
        }
        render();
    }

    function getAllMoves(r, c, type) {
        let moves = [];
        let dirs = (type === PLAYER) ? [-1] : (type === AI) ? [1] : [-1, 1];
        const allowSimpleMoves = !isMultiJump;
        for (let dr of dirs) {
            for (let dc of [-1, 1]) {
                let nr = r + dr, nc = c + dc;
                if (allowSimpleMoves && nr >= 0 && nr < 8 && nc >= 0 && nc < 8 && board[nr][nc] === EMPTY) moves.push({r: nr, c: nc});
                let jr = r + dr * 2, jc = c + dc * 2;
                if (jr >= 0 && jr < 8 && jc >= 0 && jc < 8 && board[jr][jc] === EMPTY) {
                    let midPiece = board[r + dr][c + dc];
                    if (midPiece !== EMPTY) {
                        const isPlayerP = (type <= 2);
                        const isOpponent = isPlayerP ? (midPiece >= 3) : (midPiece <= 2);
                        if (isOpponent) moves.push({r: jr, c: jc, cap: {r: r + dr, c: c + dc}});
                    }
                }
            }
        }
        return moves;
    }

    function executeMove(fr, fc, tr, tc, move) {
        const piece = board[fr][fc];
        board[tr][tc] = piece;
        board[fr][fc] = EMPTY;
        let captured = false;
        if (move.cap) { board[move.cap.r][move.cap.c] = EMPTY; captured = true; playSound('capture'); } 
        else { playSound('move'); }
        if ((tr === 0 && piece === PLAYER) || (tr === 7 && piece === AI)) { 
            board[tr][tc] = (piece === PLAYER) ? PLAYER_KING : AI_KING; 
            playSound('king'); 
        }
        updateScore();
        if (captured) {
            const nextJumps = getAllMoves(tr, tc, board[tr][tc]).filter(m => m.cap);
            if (nextJumps.length > 0) {
                isMultiJump = true; selectedPiece = {r: tr, c: tc}; validMoves = nextJumps;
                document.getElementById('turn-text').innerText = "KEEP JUMPING!";
                render();
                if (currentPlayer === AI) setTimeout(() => executeMove(tr, tc, nextJumps[0].r, nextJumps[0].c, nextJumps[0]), 600);
                return;
            }
        }
        isMultiJump = false; selectedPiece = null; validMoves = [];
        currentPlayer = (currentPlayer === PLAYER) ? AI : PLAYER;
        document.getElementById('turn-text').innerText = currentPlayer === PLAYER ? "YOUR TURN" : "AI THINKING...";
        render();
        if (checkGameOver()) return;
        if (currentPlayer === AI) setTimeout(aiPlay, 800);
    }

    function checkGameOver() {
        if (aScore === 0) { gameActive = false; document.getElementById('turn-text').innerText = "YOU WIN!"; return true; }
        if (pScore === 0) { gameActive = false; document.getElementById('turn-text').innerText = "AI WINS!"; return true; }
        return false;
    }

    function aiPlay() {
        let allMoves = [];
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                if (board[r][c] >= AI) {
                    const moves = getAllMoves(r, c, board[r][c]);
                    moves.forEach(m => allMoves.push({fr: r, fc: c, tr: m.r, tc: m.c, move: m, isCapture: !!m.cap}));
                }
            }
        }
        if (allMoves.length === 0) { gameActive = false; document.getElementById('turn-text').innerText = "YOU WIN!"; return; }
        const caps = allMoves.filter(m => m.isCapture);
        const selected = caps.length > 0 ? caps[0] : allMoves[Math.floor(Math.random() * allMoves.length)];
        executeMove(selected.fr, selected.fc, selected.tr, selected.tc, selected.move);
    }
    
    init();
</script>
</body>
</html>
