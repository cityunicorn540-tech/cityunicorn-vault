<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🔥 Neon Ship Fighter — MAX CHAOS EDITION 🔥</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      touch-action: none;
      flex-direction: column;
    }
    .game-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    canvas {
      display: block;
      border: 3px solid #00ffff;
      box-shadow: 0 0 30px #00ffff;
      background: #000;
      max-width: 100%;
      height: auto;
    }
    .hud {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
      z-index: 10;
      color: #00ffff;
      font-size: 1.2rem;
      font-weight: bold;
      text-shadow: 0 0 10px #00ffff;
    }
    .boss-warning {
      position: absolute;
      top: 50px;
      left: 0;
      right: 0;
      text-align: center;
      color: #ff4444;
      font-size: 2rem;
      font-weight: bold;
      text-shadow: 0 0 20px #ff0000;
      pointer-events: none;
      z-index: 10;
      display: none;
      animation: pulse 0.5s infinite;
    }
    .combo-display {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffff00;
      font-size: 1.8rem;
      font-weight: bold;
      text-shadow: 0 0 15px #ffff00;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .combo-active {
      opacity: 1;
      animation: comboPop 0.2s;
    }
    @keyframes comboPop {
      0% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.5); }
      100% { transform: translateX(-50%) scale(1); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.7; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); }
    }
    .game-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ff0055;
      font-size: 3.5rem;
      font-weight: bold;
      text-shadow: 0 0 30px #ff0055;
      text-align: center;
      pointer-events: none;
      z-index: 20;
      display: none;
    }
    .restart-hint {
      font-size: 1.5rem;
      color: #aaa;
      margin-top: 20px;
    }
    .powerup-text {
      position: absolute;
      color: #ffff00;
      font-size: 1.5rem;
      font-weight: bold;
      text-shadow: 0 0 10px #ffff00;
      pointer-events: none;
      animation: floatUp 1s forwards;
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-30px); }
    }

    /* START MENU */
    .start-menu-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 30;
    }
    .start-title {
      font-size: 3rem;
      color: #00ffff;
      text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff;
      margin-bottom: 0.3rem;
    }
    .start-sub {
      font-size: 1.2rem;
      color: #ff44aa;
      text-shadow: 0 0 10px #ff44aa;
      margin-bottom: 2rem;
    }
    .start-btn {
      background: #ff0055;
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 1.5rem;
      font-weight: bold;
      padding: 12px 40px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 0 15px #ff0055;
      transition: transform 0.1s;
    }
    .start-btn:hover {
      transform: scale(1.05);
    }

    /* START MENU FOOTER */
    .start-footer {
      position: absolute;
      bottom: 15px;
      left: 0;
      width: 100%;
      text-align: center;
      color: #aaa;
      font-size: 0.8rem;
      padding: 0 10px;
      box-sizing: border-box;
    }
    .start-footer a {
      color: #00ffff;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <canvas id="gameCanvas"></canvas>

    <!-- START MENU -->
    <div id="startMenu" class="start-menu-overlay">
      <h1 class="start-title">NEON SHIP FIGHTER</h1>
      <p class="start-sub">MAX CHAOS EDITION</p>
      <button id="startButton" class="start-btn">START GAME</button>
      <div class="start-footer">
        <p>
          This game is from cityunicorn540-tech and licensed under MIT 2026. You can find it here: 
          <a href="https://github.com/cityunicorn540-tech/cityunicorn-vault" target="_blank" rel="noopener noreferrer">https://github.com/cityunicorn540-tech/cityunicorn-vault</a>
        </p>
      </div>
    </div>

    <div class="hud">
      <span>SCORE: <span id="scoreDisplay">0</span></span>
      <span>🌊 WAVE: <span id="waveDisplay">1</span></span>
      <span>🎯 BOSS: <span id="nextBossDisplay">500</span></span>
    </div>
    <div class="combo-display" id="comboDisplay">COMBO x2!</div>
    <div class="boss-warning" id="bossWarning">⚠️ MEGASHIP BOSS ⚠️</div>
    <div class="game-overlay" id="gameOverlay">
      GAME OVER
      <div class="restart-hint">Tap to restart</div>
    </div>
  </div>

  <script>
    (function() {
      "use strict";

      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      const scoreSpan = document.getElementById('scoreDisplay');
      const waveSpan = document.getElementById('waveDisplay');
      const nextBossSpan = document.getElementById('nextBossDisplay');
      const bossWarningDiv = document.getElementById('bossWarning');
      const gameOverlayDiv = document.getElementById('gameOverlay');
      const comboDisplay = document.getElementById('comboDisplay');
      const startMenu = document.getElementById('startMenu');

      // ----- STARFIELD -----
      let stars = [];
      function generateStars() {
        stars = [];
        const count = 200;
        for (let i = 0; i < count; i++) {
          stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            radius: Math.random() * 2.2 + 0.8,
            baseAlpha: Math.random() * 0.5 + 0.3,
            twinkleSpeed: Math.random() * 0.015 + 0.005,
            phase: Math.random() * Math.PI * 2
          });
        }
      }
      function drawStars() {
        const now = Date.now();
        for (const star of stars) {
          const twinkle = Math.sin(now * star.twinkleSpeed + star.phase);
          const alpha = star.baseAlpha + (0.4 + 0.3 * twinkle);
          ctx.globalAlpha = Math.min(1, Math.max(0.2, alpha));
          ctx.fillStyle = '#ffffff';
          ctx.beginPath();
          ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      // ----- AUDIO -----
      let audioCtx = null;
      function initAudio() {
        if (audioCtx) return;
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
      }
      function playLaser() {
        if (!audioCtx) initAudio(); if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(1600, now);
        osc.frequency.exponentialRampToValueAtTime(200, now + 0.15);
        gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        osc.connect(gain).connect(audioCtx.destination); osc.start(); osc.stop(now + 0.15);
      }
      function playBirdScreech(type) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = type === 'red' ? 'sawtooth' : (type === 'blue' ? 'square' : 'triangle');
        const freq = type === 'red' ? 800 : (type === 'blue' ? 1200 : 1000);
        osc.frequency.setValueAtTime(freq, now);
        osc.frequency.exponentialRampToValueAtTime(freq/2, now + 0.15);
        gain.gain.setValueAtTime(0.08, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        osc.connect(gain).connect(audioCtx.destination); osc.start(); osc.stop(now + 0.15);
      }
      function playExplosion(size = 'normal') {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        const freq = size === 'big' ? 80 : 150;
        const duration = size === 'big' ? 0.6 : 0.3;
        osc.frequency.setValueAtTime(freq, now);
        osc.frequency.exponentialRampToValueAtTime(20, now + duration);
        gain.gain.setValueAtTime(size === 'big' ? 0.5 : 0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
        osc.connect(gain).connect(audioCtx.destination); osc.start(); osc.stop(now + duration);
      }
      function playPowerupCollect() {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, now);
        osc.frequency.exponentialRampToValueAtTime(1600, now + 0.1);
        gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        osc.connect(gain).connect(audioCtx.destination); osc.start(); osc.stop(now + 0.2);
      }
      function playPowerupActivate(type) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = 'square';
        const freq = type === 'rapid' ? 1000 : (type === 'shield' ? 600 : 400);
        osc.frequency.setValueAtTime(freq, now);
        osc.frequency.exponentialRampToValueAtTime(freq*2, now + 0.15);
        gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        osc.connect(gain).connect(audioCtx.destination); osc.start(); osc.stop(now + 0.3);
      }
      function playWaveComplete() {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        [0, 0.1, 0.2].forEach((offset, i) => {
          const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(440 + (i*110), now + offset);
          gain.gain.setValueAtTime(0.2, now + offset);
          gain.gain.exponentialRampToValueAtTime(0.001, now + offset + 0.2);
          osc.connect(gain).connect(audioCtx.destination);
          osc.start(now + offset); osc.stop(now + offset + 0.2);
        });
      }
      document.body.addEventListener('touchstart', function unlock() {
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      }, { once: true, passive: true });

      // ----- GAME STATE -----
      let gameActive = false;
      let score = 0;
      let wave = 1;
      let nextBossThreshold = 500;
      let bossActive = false;

      let projectiles = [];
      let bossProjectiles = [];
      let enemies = [];
      let particles = [];
      let lastSpawnTime = 0;
      let enemyProjectiles = [];
      let lastGooSpawn = 0;
      let powerups = [];

      // Combo
      let combo = 0;
      let lastKillTime = 0;
      const COMBO_TIMEOUT = 1500;

      const player = {
        x: 0, y: 0, size: 16, color: '#00f2ff',
        fireRate: 200, lastShot: 0, shielded: false
      };

      const bossShip = {
        active: false, health: 0, maxHealth: 0, x: 0, y: 100, width: 80, height: 50,
        speed: 1.8, shootCooldown: 1200, lastShot: 0, targetX: 0, targetY: 0, angle: 0
      };

      function resizeCanvas() {
        canvas.width = Math.min(600, window.innerWidth * 0.95);
        canvas.height = Math.min(700, window.innerHeight * 0.85);
        player.x = canvas.width / 2;
        player.y = canvas.height - 40;
        generateStars();
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      class Particle {
        constructor(x, y, color) {
          this.x = x; this.y = y; this.color = color;
          this.vx = (Math.random() - 0.5) * 8; this.vy = (Math.random() - 0.5) * 8;
          this.alpha = 1; this.size = Math.random() * 6 + 3;
        }
        update() { this.x += this.vx; this.y += this.vy; this.alpha -= 0.025; }
        draw() {
          ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color;
          ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
          ctx.globalAlpha = 1;
        }
      }

      function showFloatingText(text, x, y, color) {
        const el = document.createElement('div');
        el.className = 'powerup-text';
        el.textContent = text;
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        el.style.color = color;
        document.querySelector('.game-container').appendChild(el);
        setTimeout(() => el.remove(), 1000);
      }

      function checkWave() {
        const newWave = Math.floor(score / 500) + 1;
        if (newWave > wave) {
          wave = newWave;
          waveSpan.textContent = wave;
          playWaveComplete();
          showFloatingText(`WAVE ${wave}!`, canvas.width/2, canvas.height/2, '#00ffff');
          const flash = document.createElement('div');
          flash.style.position = 'absolute';
          flash.style.top = '0'; flash.style.left = '0';
          flash.style.width = '100%'; flash.style.height = '100%';
          flash.style.background = '#ffffff';
          flash.style.opacity = '0.5';
          flash.style.pointerEvents = 'none';
          document.querySelector('.game-container').appendChild(flash);
          setTimeout(() => flash.remove(), 100);
        }
      }

      function spawnBirdFlock() {
        const startX = Math.random() * (canvas.width - 150) + 75;
        const startY = -40;
        const numFlocks = wave >= 4 && Math.random() > 0.7 ? 2 : 1;
        for (let f = 0; f < numFlocks; f++) {
          const offsetX = f * 100;
          const positions = [
            { x: startX + offsetX, y: startY - (f*30) },
            { x: startX + offsetX - 45, y: startY + 30 - (f*30) },
            { x: startX + offsetX + 45, y: startY + 30 - (f*30) }
          ];
          const rand = Math.random();
          let type = 'green';
          if (wave >= 2 && rand > 0.6) type = 'blue';
          if (wave >= 3 && rand > 0.85) type = 'red';
          if (wave >= 5 && rand > 0.95) type = 'tanker';
          positions.forEach((pos, index) => {
            const speed = type === 'red' ? 4.5 : (type === 'tanker' ? 1.5 : (type === 'blue' ? 2.8 : 2.5));
            enemies.push({
              x: pos.x, y: pos.y, width: type === 'tanker' ? 40 : 30, height: type === 'tanker' ? 40 : 30,
              speed: speed, type: type,
              color: type === 'red' ? '#ff2222' : (type === 'blue' ? '#2222ff' : (type === 'tanker' ? '#ff8800' : '#00ff88')),
              wingPhase: Math.random() * Math.PI * 2,
              formationIndex: index, baseX: pos.x, baseY: pos.y,
              health: type === 'tanker' ? 3 : 1
            });
          });
        }
      }

      function spawnBossShip() {
        bossShip.active = true; bossActive = true;
        bossShip.health = 100 + (wave * 30);
        bossShip.maxHealth = bossShip.health;
        bossShip.x = canvas.width / 2; bossShip.y = -80;
        bossShip.shootCooldown = Math.max(400, 1200 - (wave * 80));
        bossShip.lastShot = Date.now();
        bossWarningDiv.style.display = 'block';
        playExplosion('big');
      }

      // ----- INPUT with AUTOFIRE -----
      let isTouching = false;
      let isMouseDown = false;

      function autofireActive() {
        return isTouching || isMouseDown;
      }

      function updatePlayerX(clientX) {
        const rect = canvas.getBoundingClientRect();
        player.x = Math.min(canvas.width - 15, Math.max(15, clientX - rect.left));
      }

      function fireProjectile() {
        if (!gameActive) return;
        const now = Date.now();
        if (now - player.lastShot > player.fireRate) {
          projectiles.push({
            x: player.x, y: player.y - 20, speed: 10, width: 4, height: 14
          });
          playLaser();
          player.lastShot = now;
        }
      }

      // Touch events
      function handleTouchStart(e) {
        e.preventDefault();
        if (!gameActive) { restartGame(); return; }
        isTouching = true;
        const touch = e.touches[0];
        if (touch) updatePlayerX(touch.clientX);
        fireProjectile(); // immediate shot on touch
      }

      function handleTouchMove(e) {
        e.preventDefault();
        if (!gameActive || !isTouching) return;
        const touch = e.touches[0];
        if (touch) updatePlayerX(touch.clientX);
      }

      function handleTouchEnd(e) {
        e.preventDefault();
        if (e.touches.length === 0) isTouching = false;
      }

      function handleTouchCancel(e) {
        if (e.touches.length === 0) isTouching = false;
      }

      // Mouse events
      function handleMouseDown(e) {
        e.preventDefault();
        if (!gameActive) { restartGame(); return; }
        isMouseDown = true;
        updatePlayerX(e.clientX);
        fireProjectile(); // immediate shot on click
      }

      function handleMouseMove(e) {
        e.preventDefault();
        if (!gameActive || !isMouseDown) return;
        updatePlayerX(e.clientX);
      }

      function handleMouseUp(e) {
        e.preventDefault();
        isMouseDown = false;
      }

      canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
      canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
      canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
      canvas.addEventListener('touchcancel', handleTouchCancel, { passive: false });

      canvas.addEventListener('mousedown', handleMouseDown);
      canvas.addEventListener('mousemove', handleMouseMove);
      canvas.addEventListener('mouseup', handleMouseUp);
      canvas.addEventListener('contextmenu', (e) => e.preventDefault());

      // ----- START GAME -----
      function startGame() {
        startMenu.style.display = 'none';
        gameActive = true;
        lastSpawnTime = Date.now();
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      }
      document.getElementById('startButton').addEventListener('click', startGame);

      // ----- UPDATE -----
      function update() {
        if (!gameActive) return;

        // 🔥 AUTOFIRE: fire as long as player is touching / holding mouse
        if (autofireActive()) {
          fireProjectile();
        }

        const now = Date.now();
        const spawnRate = Math.max(600, 2000 - (wave * 200));

        if (!bossShip.active && now - lastSpawnTime > spawnRate) {
          spawnBirdFlock();
          lastSpawnTime = now;
        }

        // Boss trigger
        if (!bossShip.active && score >= nextBossThreshold && !bossActive) {
          nextBossThreshold = score + 1000;
          nextBossSpan.textContent = nextBossThreshold;
          bossActive = true;
          spawnBossShip();
        }

        // Enemy shooting
        if (!bossShip.active && enemies.length > 0) {
          const shootInterval = Math.max(600, 2000 - (wave * 150));
          if (now - lastGooSpawn > shootInterval) {
            const shooter = enemies[Math.floor(Math.random() * enemies.length)];
            playBirdScreech(shooter.type);
            if (shooter.type === 'blue') {
              [-2, -1, 0, 1, 2].forEach(offset => {
                enemyProjectiles.push({ x: shooter.x, y: shooter.y + 15, radius: 6, speed: 4, color: '#2222ff', vx: offset * 1.5 });
              });
            } else if (shooter.type === 'tanker') {
              enemyProjectiles.push({ x: shooter.x, y: shooter.y + 20, radius: 10, speed: 2.5, color: '#ff8800', vx: 0 });
            } else {
              enemyProjectiles.push({ x: shooter.x, y: shooter.y + 15, radius: 7, speed: 3.5, color: shooter.color, vx: 0 });
            }
            lastGooSpawn = now;
          }
        }

        // Player projectiles
        for (let i = projectiles.length - 1; i >= 0; i--) {
          const p = projectiles[i]; p.y -= p.speed;
          if (p.y < 0) { projectiles.splice(i, 1); continue; }

          let used = false;
          if (bossShip.active && p.x > bossShip.x - bossShip.width/2 && p.x < bossShip.x + bossShip.width/2 && p.y > bossShip.y - bossShip.height/2 && p.y < bossShip.y + bossShip.height/2) {
            bossShip.health -= 5; used = true;
            for (let k = 0; k < 5; k++) particles.push(new Particle(p.x, p.y, '#ff44aa'));
            if (bossShip.health <= 0) {
              bossShip.active = false;
              bossActive = false;
              bossWarningDiv.style.display = 'none';
              score += 200;
              scoreSpan.textContent = score;
              playExplosion('big');
              for (let j = 0; j < 100; j++) particles.push(new Particle(bossShip.x, bossShip.y, '#ffaa00'));
              spawnPowerup(bossShip.x, bossShip.y, 'bomb');
            }
          }

          if (!used) {
            for (let eIdx = enemies.length - 1; eIdx >= 0; eIdx--) {
              const e = enemies[eIdx];
              if (Math.hypot(p.x - e.x, p.y - e.y) < e.width/2 + 5) {
                used = true;
                e.health--;
                if (e.health <= 0) {
                  enemies.splice(eIdx, 1);
                  addScore(10);
                  for (let k = 0; k < 15; k++) particles.push(new Particle(e.x, e.y, e.color));
                  if (now - lastKillTime < COMBO_TIMEOUT) {
                    combo++;
                    if (combo > 1) showCombo(combo);
                  } else { combo = 1; }
                  lastKillTime = now;
                  if (Math.random() < 0.15) {
                    const types = ['rapid', 'shield', 'bomb'];
                    spawnPowerup(e.x, e.y, types[Math.floor(Math.random()*types.length)]);
                  }
                } else {
                  for (let k = 0; k < 5; k++) particles.push(new Particle(p.x, p.y, '#ffffff'));
                }
                break;
              }
            }
          }
          if (used) projectiles.splice(i, 1);
        }

        // Enemy projectiles
        for (let i = enemyProjectiles.length - 1; i >= 0; i--) {
          const goo = enemyProjectiles[i];
          goo.y += goo.speed; goo.x += goo.vx;
          if (goo.y > canvas.height) { enemyProjectiles.splice(i, 1); continue; }
          if (Math.hypot(player.x - goo.x, player.y - goo.y) < player.size + goo.radius) {
            if (player.shielded) {
              player.shielded = false;
              enemyProjectiles.splice(i, 1);
              playExplosion('normal');
              for (let k = 0; k < 10; k++) particles.push(new Particle(player.x, player.y, '#00ffff'));
            } else { gameOver(); }
          }
        }

        // Enemy movement
        const time = now * 0.001;
        for (let i = enemies.length - 1; i >= 0; i--) {
          const e = enemies[i];
          e.y += e.speed;
          e.wingPhase += 0.3;
          if (e.type === 'red') {
            if (player.x > e.x) e.x += 1.5; else e.x -= 1.5;
          } else if (e.type === 'tanker') {
            e.x = e.baseX + Math.sin(time + e.formationIndex) * 30;
          } else {
            e.x = e.baseX + Math.sin(time * 2 + e.formationIndex) * 20;
            e.baseX += 0.4;
          }
          if (e.x > canvas.width + 50 || e.x < -50) enemies.splice(i, 1);
          if (e.y > canvas.height + 50) enemies.splice(i, 1);
          if (Math.hypot(player.x - e.x, player.y - e.y) < player.size + e.width/2) {
            if (player.shielded) {
              player.shielded = false;
              enemies.splice(i, 1);
              score += 10; scoreSpan.textContent = score;
              playExplosion('normal');
              for (let k = 0; k < 10; k++) particles.push(new Particle(player.x, player.y, '#00ffff'));
            } else { gameOver(); }
          }
        }

        // Boss logic
        if (bossShip.active) {
          bossShip.x += (player.x - bossShip.x) * 0.05;
          bossShip.y = 100 + Math.sin(Date.now()*0.002) * 20;
          if (now - bossShip.lastShot > bossShip.shootCooldown) {
            for (let s = -3; s <= 3; s++) {
              bossProjectiles.push({ x: bossShip.x, y: bossShip.y+30, vx: s*2, vy: 5, radius: 8, color: '#ff44aa' });
            }
            bossShip.lastShot = now; playExplosion('normal');
          }
          for (let i = bossProjectiles.length-1; i >= 0; i--) {
            const bp = bossProjectiles[i];
            bp.x += bp.vx; bp.y += bp.vy;
            if (bp.y > canvas.height) { bossProjectiles.splice(i, 1); continue; }
            if (Math.hypot(player.x - bp.x, player.y - bp.y) < player.size + 10) {
              if (player.shielded) {
                player.shielded = false; bossProjectiles.splice(i, 1); playExplosion('normal');
              } else gameOver();
            }
          }
        }

        // Powerups
        for (let i = powerups.length-1; i >= 0; i--) {
          const pu = powerups[i];
          pu.y += 2.5;
          if (pu.y > canvas.height) { powerups.splice(i, 1); continue; }
          if (Math.hypot(player.x - pu.x, player.y - pu.y) < player.size + 15) {
            activatePowerup(pu.type, pu.x, pu.y);
            powerups.splice(i, 1);
          }
        }

        particles.forEach(p => p.update());
        particles = particles.filter(p => p.alpha > 0);

        if (now - lastKillTime > COMBO_TIMEOUT) {
          combo = 0;
          comboDisplay.style.opacity = 0;
        }
      }

      function gameOver() {
        gameActive = false;
        playExplosion('big');
        gameOverlayDiv.style.display = 'block';
      }

      function showCombo(c) {
        comboDisplay.textContent = `COMBO x${c}! +${Math.floor(10 * (1 + c*0.1))}`;
        comboDisplay.classList.remove('combo-active');
        void comboDisplay.offsetWidth;
        comboDisplay.classList.add('combo-active');
      }

      function addScore(pts) {
        const multiplier = 1 + (combo * 0.1);
        score += Math.floor(pts * multiplier);
        scoreSpan.textContent = score;
        checkWave();
      }

      function spawnPowerup(x, y, type) { powerups.push({ x, y, type }); }

      function activatePowerup(type, x, y) {
        playPowerupCollect();
        setTimeout(() => playPowerupActivate(type), 100);
        showFloatingText(`${type.toUpperCase()}!`, x, y, '#ffff00');
        if (type === 'rapid') {
          player.fireRate = 80;
          setTimeout(() => { player.fireRate = 200; showFloatingText('SLOW', player.x, player.y, '#ff8800'); }, 5000);
        } else if (type === 'shield') {
          player.shielded = true;
        } else if (type === 'bomb') {
          enemies.forEach(e => { score += 10; for (let k = 0; k < 10; k++) particles.push(new Particle(e.x, e.y, '#ffff00')); });
          enemies = [];
          playExplosion('big');
          scoreSpan.textContent = score;
        }
      }

      // ----- DRAW -----
      function drawBird(e) {
        ctx.save(); ctx.translate(e.x, e.y);
        ctx.shadowBlur = 15; ctx.shadowColor = e.color;
        ctx.strokeStyle = e.color; ctx.lineWidth = 2.5;
        ctx.fillStyle = e.type === 'tanker' ? '#442200' : (e.color === '#ff2222' ? '#331111' : '#111133');
        const wingFlap = Math.sin(e.wingPhase) * 10;
        if (e.type === 'tanker') {
          ctx.beginPath(); ctx.moveTo(0, -15); ctx.lineTo(-15, 10); ctx.lineTo(-10, 20); ctx.lineTo(10, 20); ctx.lineTo(15, 10); ctx.closePath(); ctx.fill(); ctx.stroke();
          ctx.fillStyle = '#ff8800'; ctx.beginPath(); ctx.arc(-8, 0, 4, 0, Math.PI*2); ctx.arc(8, 0, 4, 0, Math.PI*2); ctx.fill();
        } else {
          ctx.beginPath(); ctx.moveTo(0, -12); ctx.lineTo(-10, 5); ctx.lineTo(0, 12); ctx.lineTo(10, 5); ctx.closePath(); ctx.fill(); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(-7, 0); ctx.lineTo(-20, -10 + wingFlap); ctx.lineTo(-9, 5); ctx.fill(); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(7, 0); ctx.lineTo(20, -10 + wingFlap); ctx.lineTo(9, 5); ctx.fill(); ctx.stroke();
          ctx.fillStyle = '#ffffff'; ctx.fillRect(-4, -5, 2, 2); ctx.fillRect(2, -5, 2, 2);
          ctx.fillStyle = e.color; ctx.beginPath(); ctx.moveTo(-2, 2); ctx.lineTo(0, 6); ctx.lineTo(2, 2); ctx.fill();
        }
        if (e.type === 'red') {
          ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 3;
          ctx.beginPath(); ctx.moveTo(-12, -12); ctx.lineTo(-18, -18); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(12, -12); ctx.lineTo(18, -18); ctx.stroke();
        }
        if (e.type === 'blue') {
          ctx.fillStyle = '#00ffff'; ctx.beginPath(); ctx.arc(0, 8, 4, 0, Math.PI*2); ctx.fill();
        }
        ctx.restore();
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawStars();

        // Player
        ctx.shadowBlur = 20; ctx.shadowColor = player.shielded ? '#00ffff' : player.color;
        ctx.fillStyle = player.shielded ? '#88ffff' : player.color;
        ctx.beginPath();
        ctx.moveTo(player.x, player.y - player.size);
        ctx.lineTo(player.x - player.size, player.y + player.size/2);
        ctx.lineTo(player.x + player.size, player.y + player.size/2);
        ctx.closePath(); ctx.fill();
        if (player.shielded) {
          ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 3; ctx.globalAlpha = 0.6;
          ctx.beginPath(); ctx.arc(player.x, player.y, 25, 0, Math.PI*2); ctx.stroke();
          ctx.globalAlpha = 1;
        }

        enemies.forEach(drawBird);

        if (bossShip.active) {
          ctx.save(); ctx.translate(bossShip.x, bossShip.y);
          ctx.shadowBlur = 30; ctx.shadowColor = '#ff44aa';
          ctx.fillStyle = '#331122'; ctx.strokeStyle = '#ff44aa'; ctx.lineWidth = 4;
          ctx.beginPath(); ctx.moveTo(0, -25); ctx.lineTo(-45, 25); ctx.lineTo(45, 25); ctx.closePath(); ctx.fill(); ctx.stroke();
          ctx.fillStyle = '#ff0000'; ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI*2); ctx.fill();
          ctx.restore();
          ctx.fillStyle = '#ff0000'; ctx.fillRect(canvas.width/2 - 100, 20, 200 * (bossShip.health/bossShip.maxHealth), 12);
          ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeRect(canvas.width/2 - 100, 20, 200, 12);
        }

        ctx.fillStyle = '#ff44ff'; ctx.shadowBlur = 10; ctx.shadowColor = '#ff44ff';
        projectiles.forEach(p => ctx.fillRect(p.x-2, p.y, 4, 14));

        ctx.shadowBlur = 12;
        enemyProjectiles.forEach(g => { ctx.fillStyle = g.color; ctx.beginPath(); ctx.arc(g.x, g.y, g.radius, 0, Math.PI*2); ctx.fill(); });

        ctx.fillStyle = '#ff44aa'; ctx.shadowColor = '#ff44aa';
        bossProjectiles.forEach(bp => { ctx.beginPath(); ctx.arc(bp.x, bp.y, bp.radius, 0, Math.PI*2); ctx.fill(); });

        powerups.forEach(pu => {
          ctx.shadowBlur = 15;
          if (pu.type === 'rapid') {
            ctx.fillStyle = '#ffff00'; ctx.fillRect(pu.x-10, pu.y-10, 20, 20);
            ctx.fillStyle = '#000'; ctx.font = 'bold 16px monospace'; ctx.textAlign = 'center'; ctx.fillText('⚡', pu.x, pu.y+5);
          }
          if (pu.type === 'shield') {
            ctx.fillStyle = '#00ffff'; ctx.beginPath(); ctx.arc(pu.x, pu.y, 12, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
          }
          if (pu.type === 'bomb') {
            ctx.fillStyle = '#ff0000'; ctx.beginPath(); ctx.arc(pu.x, pu.y, 12, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.fillRect(pu.x-8, pu.y-2, 16, 4); ctx.fillRect(pu.x-2, pu.y-8, 4, 16);
          }
        });

        particles.forEach(p => p.draw());
        ctx.shadowBlur = 0;
      }

      function restartGame() {
        gameActive = true;
        score = 0; wave = 1; combo = 0;
        nextBossThreshold = 500; bossActive = false;
        projectiles = []; bossProjectiles = []; enemies = []; particles = []; enemyProjectiles = []; powerups = [];
        bossShip.active = false; player.shielded = false; player.fireRate = 200;
        scoreSpan.textContent = '0'; waveSpan.textContent = '1'; nextBossSpan.textContent = '500';
        bossWarningDiv.style.display = 'none'; gameOverlayDiv.style.display = 'none'; comboDisplay.style.opacity = 0;
        lastSpawnTime = Date.now();
        // Reset autofire state so you don't start shooting after a restart
        isTouching = false;
        isMouseDown = false;
      }

      function gameLoop() {
        update(); draw(); requestAnimationFrame(gameLoop);
      }
      gameLoop();
    })();
  </script>
