<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="author" content="cityunicorn540-tech">
    <title>Neon Snake | CityUnicorn</title>
    <style>
        body { background: #0d0208; color: #fff; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; touch-action: none; }
        h1 { color: #bc13fe; text-shadow: 0 0 10px #ff00e6; font-size: 1.5rem; margin-bottom: 5px; }
        .dev-credit { color: #bc13fe; font-size: 0.8rem; margin-bottom: 15px; opacity: 0.8; }
        canvas { background: #1a1a2e; border: 2px solid #bc13fe; border-radius: 10px; box-shadow: 0 0 20px rgba(188, 19, 254, 0.4); max-width: 90vw; }
        #scoreBoard { color: #00ff41; font-size: 1.2rem; margin-top: 10px; }
        .mobile-note { font-size: 0.8rem; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>NEON SNAKE</h1>
    <p class="dev-credit">Developed by cityunicorn540-tech</p>
    
    <canvas id="gameCanvas" width="300" height="300"></canvas>
    <div id="scoreBoard">Score: <span id="score">0</span></div>
    <p class="mobile-note">Swipe anywhere on screen to control.</p>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        const gridSize = 20; 
        const tileCount = canvas.width / gridSize;
        const gameSpeed = 300; 

        let snake = [{ x: 10, y: 10 }];
        let food = { x: 5, y: 5 };
        let dx = 0; 
        let dy = 0; 
        let score = 0;
        let isGameOver = false;

        const snakeColor = '#bc13fe'; 
        const foodColor = '#ff00e6'; 

        function main() {
            if (isGameOver) { 
                ctx.fillStyle = "white"; 
                ctx.font = "bold 18px Segoe UI"; 
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2 - 10);
                ctx.font = "14px Segoe UI";
                ctx.fillText("Tap to reset", canvas.width/2, canvas.height/2 + 20); 
                return; 
            }
            setTimeout(function() {
                requestAnimationFrame(main);
                clearCanvas();
                moveSnake();
                drawFood();
                drawSnake();
                checkGameOver();
            }, gameSpeed);
        }

        function clearCanvas() { ctx.fillStyle = "#1a1a2e"; ctx.fillRect(0, 0, canvas.width, canvas.height); }
        function drawFood() { ctx.fillStyle = foodColor; ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 1, gridSize - 1); }
        function drawSnake() { 
            snake.forEach(part => { 
                ctx.fillStyle = snakeColor; 
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 1, gridSize - 1); 
            }); 
        }

        function moveSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head); 
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                placeFood();
            } else { snake.pop(); } 
        }

        function placeFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            snake.forEach(part => { if(part.x === food.x && part.y === food.y) placeFood(); });
        }

        function checkGameOver() {
            const head = snake[0];
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) { isGameOver = true; }
            for (let i = 1; i < snake.length; i++) { if (snake[i].x === head.x && snake[i].y === head.y) { isGameOver = true; } }
        }

        let startX, startY;
        document.addEventListener('touchstart', e => { 
            startX = e.touches[0].clientX; 
            startY = e.touches[0].clientY; 
            if(isGameOver) resetGame(); 
        }, {passive: false});

        document.addEventListener('touchend', e => {
            if (!startX || !startY || isGameOver) return;
            const endX = e.changedTouches[0].clientX;
            const endY = e.changedTouches[0].clientY;
            const delX = endX - startX; 
            const delY = endY - startY;

            if (Math.abs(delX) > Math.abs(delY)) { 
                if (delX > 0 && dx === 0) { dx = 1; dy = 0; } 
                else if (delX < 0 && dx === 0) { dx = -1; dy = 0; } 
            } else { 
                if (delY > 0 && dy === 0) { dx = 0; dy = 1; } 
                else if (delY < 0 && dy === 0) { dx = 0; dy = -1; } 
            }
            startX = startY = null; 
        });

        function resetGame() { 
            snake = [{ x: 10, y: 10 }]; dx = 0; dy = 0; score = 0; scoreEl.textContent = 0; 
            placeFood(); isGameOver = false; main(); 
        }

        placeFood();
        main();
    </script>
</body>
</html>
