<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="author" content="cityunicorn540-tech in collab with gemini ai">
    <title>Zt 2 | cityunicorn540-tech</title>
    <style>
        body { 
            background: #0d0208; color: #fff; text-align: center; 
            font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; 
            touch-action: none; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; height: 100vh;
        }
        h1 { color: #bc13fe; text-shadow: 0 0 15px #ff00e6; font-size: 1.8rem; margin: 0; }
        .dev-credit { color: #bc13fe; font-size: 0.75rem; margin-top: 8px; margin-bottom: 25px; opacity: 0.7; }
        #canvas-frame { padding: 4px; border: 2px solid #bc13fe; border-radius: 18px; box-shadow: 0 0 25px rgba(188, 19, 254, 0.4); }
        canvas { background: #1a1a2e; border-radius: 14px; display: block; image-rendering: pixelated; }
        #score-val { color: #00ff41; font-size: 1.4rem; font-weight: bold; margin-top: 15px; }
        .mobile-note { font-size: 0.75rem; color: #666; margin-top: 8px; }
    </style>
</head>
<body>

    <h1>🎮 Zt 2</h1>
    <p class="dev-credit">Developed by cityunicorn540-tech in collab with gemini ai</p>
    
    <div id="canvas-frame">
        <canvas id="stage" width="300" height="375"></canvas>
    </div>
    
    <div id="score-val">Score: <span id="val">0</span></div>
    <p class="mobile-note">Tap to restart after Breach · Swipe to move</p>

    <script>
        const canvas = document.getElementById('stage');
        const ctx = canvas.getContext('2d');
        const valEl = document.getElementById('val');

        let score = 0;
        let isGameOver = false;
        const CASUAL_SPEED = 1.5; // Slower player speed

        let player = { x: 140, y: 160, vx: CASUAL_SPEED, vy: 0, size: 20 };
        let coin = { x: 0, y: 0, radius: 8 };
        let enemies = [];

        function spawnCoin() {
            coin.x = Math.floor(Math.random() * (canvas.width - 40)) + 20;
            coin.y = Math.floor(Math.random() * (canvas.height - 40)) + 20;
        }

        function spawnEnemy() {
            if (enemies.length < 4) {
                enemies.push({
                    x: Math.random() < 0.5 ? 0 : canvas.width - 20,
                    y: Math.random() * (canvas.height - 20),
                    vx: (Math.random() * 1.5 + 0.5) * (Math.random() < 0.5 ? 1 : -1),
                    vy: (Math.random() * 1.5 + 0.5) * (Math.random() < 0.5 ? 1 : -1),
                    size: 20
                });
            }
        }

        function resetGame() {
            score = 0;
            valEl.textContent = "0";
            isGameOver = false;
            player = { x: 140, y: 160, vx: CASUAL_SPEED, vy: 0, size: 20 };
            enemies = [];
            spawnCoin();
        }

        function update() {
            if (isGameOver) return;

            player.x += player.vx;
            player.y += player.vy;
            if (player.x <= 0 || player.x + player.size >= canvas.width) player.vx *= -1;
            if (player.y <= 0 || player.y + player.size >= canvas.height) player.vy *= -1;

            let dx = player.x + 10 - coin.x;
            let dy = player.y + 10 - coin.y;
            if (Math.sqrt(dx*dx + dy*dy) < 18) {
                score += 10;
                valEl.textContent = score;
                spawnCoin();
                // Spawn enemy at 10, then every 100 points up to 4 enemies
                if (score === 10 || (score > 10 && score % 100 === 0)) spawnEnemy();
            }

            enemies.forEach(en => {
                en.x += en.vx;
                en.y += en.vy;
                if (en.x <= 0 || en.x + en.size >= canvas.width) en.vx *= -1;
                if (en.y <= 0 || en.y + en.size >= canvas.height) en.vy *= -1;
                if (player.x < en.x + en.size && player.x + player.size > en.x &&
                    player.y < en.y + en.size && player.y + player.size > en.y) {
                    isGameOver = true;
                }
            });
        }

        function draw() {
            ctx.fillStyle = "#1a1a2e";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#ffff00";
            ctx.shadowBlur = 10; ctx.shadowColor = "#ffff00";
            ctx.beginPath(); ctx.arc(coin.x, coin.y, coin.radius, 0, Math.PI*2); ctx.fill();

            ctx.fillStyle = "#ff00ff";
            ctx.shadowBlur = 15; ctx.shadowColor = "#ff00ff";
            enemies.forEach(en => ctx.fillRect(en.x, en.y, en.size, en.size));

            ctx.fillStyle = "#bc13fe";
            ctx.shadowBlur = 15; ctx.shadowColor = "#ff00e6";
            ctx.fillRect(player.x, player.y, player.size, player.size);
            ctx.shadowBlur = 0;

            if (isGameOver) {
                ctx.fillStyle = "rgba(0,0,0,0.8)";
                ctx.fillRect(0,0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "bold 20px Segoe UI";
                ctx.textAlign = "center";
                ctx.fillText("Game Over", canvas.width/2, canvas.height/2);
                ctx.font = "14px Segoe UI";
                ctx.fillText("Tap to try again", canvas.width/2, canvas.height/2 + 30);
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        let sX, sY;
        document.addEventListener('touchstart', e => { 
            if(isGameOver) { resetGame(); return; }
            sX = e.touches[0].clientX; sY = e.touches[0].clientY; 
        }, {passive: false});

        document.addEventListener('touchend', e => {
            if(isGameOver) return;
            const dX = e.changedTouches[0].clientX - sX;
            const dY = e.changedTouches[0].clientY - sY;
            if (Math.abs(dX) > Math.abs(dY) && Math.abs(dX) > 30) { player.vx = dX > 0 ? CASUAL_SPEED : -CASUAL_SPEED; player.vy = 0; }
            else if (Math.abs(dY) > 30) { player.vy = dY > 0 ? CASUAL_SPEED : -CASUAL_SPEED; player.vx = 0; }
        }, {passive: false});

        spawnCoin();
        loop();
    </script>
</body>
</html>
