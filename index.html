<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>The CityUnicorn Vault - Browser Games</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦄</text></svg>">
    
    <style>
        /* --- PRO CSS FROM YOUR STYLE.CSS --- */
        :root {
            --primary-color: #7c3aed; --primary-dark: #5b21b6; --primary-light: #a78bfa;
            --accent-color: #f472b6; --bg-dark: #0f0f1a; --bg-card: #1a1a2e;
            --text-primary: #ffffff; --text-secondary: #a0a0b8; --border-color: #2d2d4a;
            --radius-md: 12px; --radius-lg: 20px; --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-overflow-scrolling: touch; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text-primary); overflow-x: hidden; }

        /* Background Glow Effect */
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at 20% 20%, rgba(124, 58, 237, 0.15) 0%, transparent 50%);
            z-index: -1; pointer-events: none;
        }

        .header { background: rgba(26, 26, 46, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; }
        .header-content { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.5rem; max-width: 1400px; margin: 0 auto; }
        .logo { display: flex; align-items: center; gap: 0.75rem; }
        .logo-icon { font-size: 2.5rem; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .logo h1 { font-size: 1.5rem; background: linear-gradient(135deg, var(--primary-light), var(--accent-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .search-container { padding: 0 1.5rem 1rem; max-width: 1400px; margin: 0 auto; }
        .search-input { width: 100%; padding: 0.875rem 1rem; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-md); color: white; }

        .category-filters { display: flex; gap: 0.5rem; padding: 0 1.5rem 1rem; overflow-x: auto; scrollbar-width: none; }
        .filter-btn { padding: 0.5rem 1rem; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-secondary); cursor: pointer; white-space: nowrap; }
        .filter-btn.active { background: var(--primary-color); color: white; }

        .hero { padding: 2rem 1.5rem; text-align: center; }
        .stat-number { font-size: 2.5rem; font-weight: 700; color: var(--primary-light); }

        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; padding: 1.5rem; max-width: 1400px; margin: 0 auto; }
        .game-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); overflow: hidden; transition: var(--transition); cursor: pointer; }
        .game-card:hover { transform: translateY(-5px); border-color: var(--primary-color); box-shadow: 0 8px 32px rgba(124, 58, 237, 0.2); }
        .game-cover { height: 180px; background: linear-gradient(135deg, var(--primary-dark), var(--primary-color)); display: flex; align-items: center; justify-content: center; font-size: 4rem; }
        .game-info { padding: 1.25rem; }
        .play-btn { width: 100%; padding: 0.75rem; background: var(--primary-color); border: none; border-radius: 8px; color: white; font-weight: bold; margin-top: 10px; }

        /* Modal */
        .game-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; padding: 1rem; }
        .game-modal.active { display: flex; align-items: center; justify-content: center; }
        .game-modal-content { background: var(--bg-card); border-radius: var(--radius-lg); width: 100%; max-width: 1000px; height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
        .game-modal-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem; border-bottom: 1px solid var(--border-color); }
        .game-frame-container { flex-grow: 1; background: #000; position: relative; }
        #gameFrame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .close-btn { background: #ef4444; color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; }

        @media (max-width: 768px) { .games-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-content">
            <div class="logo"><span class="logo-icon">🦄</span><h1>CityUnicorn Vault</h1></div>
            <div class="stat"><span class="stat-number" id="totalGames">0</span></div>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search the Vault..." class="search-input">
        </div>
        <div class="category-filters" id="categoryFilters">
            <button class="filter-btn active" data-category="all">All Games</button>
            <button class="filter-btn" data-category="action">Action</button>
            <button class="filter-btn" data-category="puzzle">Puzzle</button>
            <button class="filter-btn" data-category="arcade">Arcade</button>
        </div>
    </header>

    <main>
        <div class="games-grid" id="gamesGrid"></div>
    </main>

    <div class="game-modal" id="gameModal">
        <div class="game-modal-content">
            <div class="game-modal-header">
                <h3 id="modalGameTitle">Loading Game...</h3>
                <button class="close-btn" id="closeModal">✕ CLOSE</button>
            </div>
            <div class="game-frame-container">
                <iframe id="gameFrame" src="" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script>
        // --- DATA FROM YOUR MAIN.JS ---
        const gamesData = [
            { id: 1, title: "Retro Snake", description: "Eat food, grow longer!", cover: "🐍", gameUrl: "https://www.google.com/logos/2010/pacman10-i.html", category: "arcade" },
            { id: 2, title: "Puzzle Challenge", description: "Test your brain.", cover: "🧩", gameUrl: "https://play2048.co/", category: "puzzle" },
            { id: 3, title: "Space Defender", description: "Defend from aliens!", cover: "🚀", gameUrl: "https://hextris.io/", category: "action" },
            { id: 8, title: "Tetris Blocks", description: "Stack falling blocks.", cover: "🧱", gameUrl: "https://tetris.com/play-tetris", category: "puzzle" }
        ];

        const gamesGrid = document.getElementById('gamesGrid');
        const searchInput = document.getElementById('searchInput');
        const gameModal = document.getElementById('gameModal');
        const gameFrame = document.getElementById('gameFrame');
        const totalGamesEl = document.getElementById('totalGames');

        let currentCategory = 'all';
        let searchQuery = '';

        function renderGames() {
            const filtered = gamesData.filter(game => {
                const matchesCat = currentCategory === 'all' || game.category === currentCategory;
                const matchesSearch = game.title.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesCat && matchesSearch;
            });

            gamesGrid.innerHTML = filtered.map(game => `
                <div class="game-card" onclick="openGame(${game.id})">
                    <div class="game-cover">${game.cover}</div>
                    <div class="game-info">
                        <h3 class="game-title">${game.title}</h3>
                        <p class="game-description">${game.description}</p>
                        <button class="play-btn">PLAY NOW</button>
                    </div>
                </div>
            `).join('');
            totalGamesEl.textContent = gamesData.length;
        }

        function openGame(id) {
            const game = gamesData.find(g => g.id === id);
            document.getElementById('modalGameTitle').textContent = game.title;
            gameFrame.src = game.gameUrl;
            gameModal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        document.getElementById('closeModal').onclick = () => {
            gameModal.classList.remove('active');
            gameFrame.src = '';
            document.body.style.overflow = '';
        };

        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderGames();
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelector('.filter-btn.active').classList.remove('active');
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                renderGames();
            };
        });

        renderGames();
    </script>
</body>
</html>
